name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK components
        run: |
          sdkmanager --install "platforms;android-34" "build-tools;34.0.0" "platform-tools" > /dev/null

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.7

      - name: Find project and build APK
        run: |
          PROJECT_DIR=$(find . -maxdepth 5 -name "settings.gradle.kts" -exec dirname {} \; | head -n 1)
          echo "Building project found at: $PROJECT_DIR"
          cd "$PROJECT_DIR"
          gradle assembleDebug --stacktrace
          mkdir -p "$GITHUB_WORKSPACE/apk_output"
          find . -name "app-debug.apk" -exec cp {} "$GITHUB_WORKSPACE/apk_output/" \;

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mini-terminal-debug-apk
          path: apk_output/app-debug.apk
